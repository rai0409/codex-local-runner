name: Contract Suite

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  contract-suite:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run contract suite
        run: python -m unittest tests.test_execution_path tests.test_verify_runner tests.test_run_codex_contract tests.test_worktree -v
