require_ci_green: true
require_rubric_all_pass: true
require_declared_equals_observed_category: true
require_no_forbidden_paths_touched: true
require_diff_size_within_limit: true
auto_merge_categories:
  - docs_only
  - ci_only
  - test_only
  - contract_guard_only
auto_progression:
  policy_eligible_categories:
    - docs_only
    - test_only
  auto_pr_candidate_categories:
    - docs_only
  max_changed_files: 8
  max_total_diff_lines: 120
  generated_path_patterns:
    - "**/__pycache__/**"
    - "**/*.pyc"
    - "dist/**"
    - "build/**"
  binary_file_extensions:
    - ".png"
    - ".jpg"
    - ".jpeg"
    - ".gif"
    - ".pdf"
    - ".zip"
  runtime_sensitive_path_patterns:
    - "run_codex.py"
    - "app.py"
    - "adapters/**"
    - "verify/**"
    - "workspace/**"
  contract_sensitive_path_patterns:
    - "docs/reviewer_handoff.md"
    - "adapters/codex_cli.py"
  category_thresholds:
    docs_only:
      max_changed_files: 4
      max_total_diff_lines: 80
      requires_ci_green: true
      required_tests:
        - "contract_suite"
      forbidden_paths:
        - "docs/reviewer_handoff.md"
    test_only:
      max_changed_files: 6
      max_total_diff_lines: 120
      requires_ci_green: true
      required_tests:
        - "contract_suite"
      forbidden_paths: []
write_authority:
  enabled: false
  dry_run: true
  kill_switch: true
  allowed_categories:
    - docs_only
  required_lifecycle_states:
    - approved_for_merge
retry_replan:
  max_attempts: 2
  retriable_failure_types:
    - execution_failure
    - missing_signal
